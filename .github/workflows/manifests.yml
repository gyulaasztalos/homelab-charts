name: Manifest Best-Practices & Deprecation Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Render each wrapper chart to plain manifests, then run kube-linter and pluto
# over the rendered output (mirrors the ArgoCD repo's CI, adapted for Helm).
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Render charts to ./rendered
        run: |
          set -euo pipefail
          mkdir -p rendered
          for dir in charts/*/; do
            name="$(basename "$dir")"
            [ "$name" = "common" ] && continue
            helm dependency build "$dir"
            helm template "$name" "$dir" > "rendered/${name}.yaml"
          done

      - name: Upload rendered manifests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rendered-manifests
          path: rendered/

  kube-linter:
    needs: render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: rendered-manifests
          path: rendered/
      - name: Run KubeLinter
        uses: stackrox/kube-linter-action@87802a2f4e01abebb3ee3c67a3002fea71f6eae5 # v1
        with:
          directory: ./rendered

  pluto:
    needs: render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: rendered-manifests
          path: rendered/
      - name: Install Pluto
        uses: FairwindsOps/pluto/github-action@5f85d3f5474aede69f17f71d3e0a36674b8b8b62 # master
      - name: Scan rendered manifests for deprecated APIs
        run: |
          printf "\nScanning rendered manifests for deprecated APIs...\n"
          pluto detect-files -d ./rendered -o markdown
