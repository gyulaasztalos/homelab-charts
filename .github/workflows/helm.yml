name: Helm Lint & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Install kubeconform
        run: |
          KC_VERSION="$(curl -fsSL https://api.github.com/repos/yannh/kubeconform/releases/latest | grep -oP '"tag_name":\s*"\K[^"]+')"
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KC_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Lint, template and validate every wrapper chart
        run: |
          set -euo pipefail
          # kubeconform args as an array (avoids word-splitting fragility).
          # - default schemas + the datree CRD catalog for Traefik / ServiceMonitor / ExternalSecret
          # - IngressRoute is skipped: the public CRD catalog schema for traefik.io
          #   IngressRoute is stale and rejects the VALID spec.ingressClassName field
          #   (present in current Traefik CRDs and in the existing cluster manifests).
          #   Documented CI exception.
          KC_ARGS=(
            -strict -summary -ignore-missing-schemas
            -schema-location default
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
            -skip IngressRoute
          )
          for dir in charts/*/; do
            name="$(basename "$dir")"
            [ "$name" = "common" ] && continue          # library chart renders nothing
            echo "::group::$name"
            helm dependency build "$dir"
            helm lint "$dir"
            helm template "$name" "$dir" | kubeconform "${KC_ARGS[@]}"
            echo "::endgroup::"
          done

      - name: Boolean-toggle regression test
        run: bash hack/test-toggles.sh
