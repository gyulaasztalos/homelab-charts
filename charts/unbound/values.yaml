# =============================================================================
# unbound — EXAMPLE values (generic / shareable)
# Rendered through the `common` library chart (see charts/common).
#
# This file is a self-documenting EXAMPLE: every value the library chart
# understands is listed with its effective default and a comment. The real
# deployment config lives in the GitOps repo (apps/unbound/values.yaml) and
# overrides this file at deploy time via Helm `valueFiles`. The chart renders
# validly on these defaults alone (CI renders it).
#
# Unbound is a recursive DNS resolver forwarding upstream over DNS-over-TLS.
# Nothing in the config below is homelab-specific — it is stock upstream tuning
# plus RFC1918 access-control — so the GitOps values are identical to these.
#
# TWO CONTAINERS: unbound itself, plus a metrics exporter sidecar that reads
# unbound's control socket over a shared emptyDir. The sidecar is declared in
# `extraContainers` (requires common >= 0.3.0).
# =============================================================================

name: unbound
namespace: unbound

# -----------------------------------------------------------------------------
# Container image (the MAIN container). `image.tag` is the SINGLE source of truth
# for the app version; Renovate bumps it. The exporter sidecar carries its own
# image string further down under `extraContainers`.
# -----------------------------------------------------------------------------
image:
  repository: klutchell/unbound
  # renovate: datasource=docker depName=klutchell/unbound
  tag: 1.25.2
  pullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# Controller. type = deployment | statefulset | daemonset.
# Unbound holds only an in-memory cache — no PVC, no node-local hardware — so it
# is a plain Deployment.
#
# The kube-linter waiver is preserved from the original manifest: unbound needs a
# writable root filesystem for /var/unbound (root.hints / root.key).
# -----------------------------------------------------------------------------
controller:
  type: deployment
  replicas: 1
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  annotations:
    ignore-check.kube-linter.io/no-read-only-root-fs: "Unbound requires a writable root filesystem for /var/unbound"

# -----------------------------------------------------------------------------
# ServiceAccount. Unbound never calls the Kubernetes API, so it runs under the
# namespace's `default` ServiceAccount and the chart creates nothing.
# See charts/homepage for the full knob set (create/name/secrets/tokenSecret).
# -----------------------------------------------------------------------------
serviceAccount:
  create: false
  secrets: []
  tokenSecret:
    create: false

# -----------------------------------------------------------------------------
# Pod security. NOTE: this app does NOT use the usual uid/gid 1000 homelab
# standard — the uid/gid must match the `unbound` user inside the image so both
# containers can share the control socket. There is also deliberately no
# seccompProfile here, matching the original manifest.
# -----------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101   # must match unbound's user for socket access
  runAsGroup: 102
  fsGroup: 102     # matches the "unbound" group in the image

# Container-level security context for the MAIN container.
# readOnlyRootFilesystem is false on purpose (see the waiver above);
# NET_BIND_SERVICE is required to bind privileged port 53.
securityContext:
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  privileged: false
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]

# Schedule at most one replica per node (default true in the library chart).
podAntiAffinity: true

# -----------------------------------------------------------------------------
# Ports on the MAIN container. DNS answers on 53 over both UDP and TCP.
# -----------------------------------------------------------------------------
ports:
  - name: "dns-udp"
    containerPort: 53
    protocol: "UDP"
  - name: "dns-tcp"
    containerPort: 53
    protocol: "TCP"

# -----------------------------------------------------------------------------
# Configuration. Unbound takes no environment variables — everything is in the
# two config files below, mounted by subPath.
# -----------------------------------------------------------------------------
envFromConfigMap: ""
envFromSecrets: []
env: []

# Both ConfigMaps are chart-owned, so the chart's checksum/config annotation
# covers them: editing either file rolls the pod, which matters for a resolver
# whose entire behaviour is defined by these files.
configMaps:
  - name: unbound-main-conf
    files:
      unbound.conf: |
        server:
            ###########################################################################
            # BASIC SETTINGS
            ###########################################################################

            do-ip4: yes
            do-udp: yes
            do-tcp: yes

            # May be set to yes if you have IPv6 connectivity
            do-ip6: yes

            # You want to leave this to no unless you have *native* IPv6. With 6to4 and
            # Terredo tunnels your web browser should favor IPv4 for the same reasons
            prefer-ip6: no


            # Time to live maximum for RRsets and messages in the cache. If the maximum
            # kicks in, responses to clients still get decrementing TTLs based on the
            # original (larger) values. When the internal TTL expires, the cache item
            # has expired. Can be set lower to force the resolver to query for data
            # often, and not trust (very large) TTL values.
            cache-max-ttl: 86400

            # Time to live minimum for RRsets and messages in the cache. If the minimum
            # kicks in, the data is cached for longer than the domain owner intended,
            # and thus less queries are made to look up the data. Zero makes sure the
            # data in the cache is as the domain owner intended, higher values,
            # especially more than an hour or so, can lead to trouble as the data in
            # the cache does not match up with the actual data any more.
            cache-min-ttl: 300

            # Set the working directory for the program.
            directory: "/var/unbound"

            # RFC 6891. Number  of bytes size to advertise as the EDNS reassembly buffer
            # size. This is the value put into  datagrams over UDP towards peers.
            # The actual buffer size is determined by msg-buffer-size (both for TCP and
            # UDP). Do not set higher than that value.
            # Default  is  1232 which is the DNS Flag Day 2020 recommendation.
            # Setting to 512 bypasses even the most stringent path MTU problems, but
            # is seen as extreme, since the amount of TCP fallback generated is
            # excessive (probably also for this resolver, consider tuning the outgoing
            # tcp number).
            edns-buffer-size: 1232

            # Listen to for queries from clients and answer from this network interface
            # and port.
            interface: 0.0.0.0@53

            # Rotates RRSet order in response (the pseudo-random number is taken from
            # the query ID, for speed and thread safety).
            rrset-roundrobin: yes

            # Drop user  privileges after  binding the port.
            username: ""

            ###########################################################################
            # LOGGING
            ###########################################################################

            # Do not print log lines to inform about local zone actions
            log-local-actions: no

            # Do not print one line per query to the log
            log-queries: no

            # Do not print one line per reply to the log
            log-replies: no

            # Do not print log lines that say why queries return SERVFAIL to clients
            log-servfail: no

            # If you want to log to a file, use:
            # logfile: /etc/unbound/unbound.log
            # Set log location (using /dev/null further limits logging)
            logfile: ""

            # Only log errors
            verbosity: 1
            extended-statistics: yes

            ###########################################################################
            # PRIVACY SETTINGS
            ###########################################################################

            # RFC 8198. Use the DNSSEC NSEC chain to synthesize NXDO-MAIN and other
            # denials, using information from previous NXDO-MAINs answers. In other
            # words, use cached NSEC records to generate negative answers within a
            # range and positive answers from wildcards. This increases performance,
            # decreases latency and resource utilization on both authoritative and
            # recursive servers, and increases privacy. Also, it may help increase
            # resilience to certain DoS attacks in some circumstances.
            aggressive-nsec: yes

            # Extra delay for timeouted UDP ports before they are closed, in msec.
            # This prevents very delayed answer packets from the upstream (recursive)
            # servers from bouncing against closed ports and setting off all sort of
            # close-port counters, with eg. 1500 msec. When timeouts happen you need
            # extra sockets, it checks the ID and remote IP of packets, and unwanted
            # packets are added to the unwanted packet counter.
            delay-close: 10000

            # Prevent the unbound server from forking into the background as a daemon
            do-daemonize: no

            # Add localhost to the do-not-query-address list.
            do-not-query-localhost: no

            # Number  of  bytes size of the aggressive negative cache.
            neg-cache-size: 4M

            # Send minimum amount of information to upstream servers to enhance
            # privacy (best privacy).
            qname-minimisation: yes

            ###########################################################################
            # SECURITY SETTINGS
            ###########################################################################
            # Only give access to recursion clients from LAN IPs
            access-control: 127.0.0.1/32 allow
            access-control: 192.168.0.0/16 allow
            access-control: 172.16.0.0/12 allow
            access-control: 10.0.0.0/8 allow
            access-control: fc00::/7 allow
            access-control: ::1/128 allow

            root-hints: "/var/unbound/root.hints"
            # File with trust anchor for  one  zone, which is tracked with RFC5011
            # probes.
            auto-trust-anchor-file: "/var/unbound/root.key"

            # Enable chroot (i.e, change apparent root directory for the current
            # running process and its children)
            chroot: ""

            # Deny queries of type ANY with an empty response.
            deny-any: yes

            # Harden against algorithm downgrade when multiple algorithms are
            # advertised in the DS record.
            harden-algo-downgrade: yes

            # RFC 8020. returns nxdomain to queries for a name below another name that
            # is already known to be nxdomain.
            harden-below-nxdomain: yes

            # Require DNSSEC data for trust-anchored zones, if such data is absent, the
            # zone becomes bogus. If turned off you run the risk of a downgrade attack
            # that disables security for a zone.
            harden-dnssec-stripped: yes

            # Only trust glue if it is within the servers authority.
            harden-glue: yes

            # Ignore very large queries.
            harden-large-queries: yes

            # Perform additional queries for infrastructure data to harden the referral
            # path. Validates the replies if trust anchors are configured and the zones
            # are signed. This enforces DNSSEC validation on nameserver NS sets and the
            # nameserver addresses that are encountered on the referral path to the
            # answer. Experimental option.
            harden-referral-path: yes

            # Ignore very small EDNS buffer sizes from queries.
            harden-short-bufsize: yes

            # If enabled the HTTP header User-Agent is not set. Use with caution
            # as some webserver configurations may reject HTTP requests lacking
            # this header. If needed, it is better to explicitly set the
            # the http-user-agent.
            hide-http-user-agent: no

            # Refuse id.server and hostname.bind queries
            hide-identity: yes

            # Refuse version.server and version.bind queries
            hide-version: yes

            # Set the HTTP User-Agent header for outgoing HTTP requests. If
            # set to "", the default, then the package name and version are
            # used.
            http-user-agent: "DNS"

            # Report this identity rather than the hostname of the server.
            identity: "DNS"

            # These private network addresses are not allowed to be returned for public
            # internet names. Any  occurrence of such addresses are removed from DNS
            # answers. Additionally, the DNSSEC validator may mark the  answers  bogus.
            # This  protects  against DNS  Rebinding
            private-address: 10.0.0.0/8
            private-address: 172.16.0.0/12
            private-address: 192.168.0.0/16
            private-address: 169.254.0.0/16
            private-address: fd00::/8
            private-address: fe80::/10
            # private-address: ::ffff:0:0/96

            # Enable ratelimiting of queries (per second) sent to nameserver for
            # performing recursion. More queries are turned away with an error
            # (servfail). This stops recursive floods (e.g., random query names), but
            # not spoofed reflection floods. Cached responses are not rate limited by
            # this setting. Experimental option.
            ratelimit: 1000

            # Use this certificate bundle for authenticating connections made to
            # outside peers (e.g., auth-zone urls, DNS over TLS connections).
            tls-cert-bundle: /etc/ssl/certs/ca-certificates.crt

            # Set the total number of unwanted replies to eep track of in every thread.
            # When it reaches the threshold, a defensive action of clearing the rrset
            # and message caches is taken, hopefully flushing away any poison.
            # Unbound suggests a value of 10 million.
            unwanted-reply-threshold: 10000

            # Use 0x20-encoded random bits in the query to foil spoof attempts. This
            # perturbs the lowercase and uppercase of query names sent to authority
            # servers and checks if the reply still has the correct casing.
            # This feature is an experimental implementation of draft dns-0x20.
            # Experimental option.
            use-caps-for-id: yes

            # Help protect users that rely on this validator for authentication from
            # potentially bad data in the additional section. Instruct the validator to
            # remove data from the additional section of secure messages that are not
            # signed properly. Messages that are insecure, bogus, indeterminate or
            # unchecked are not affected.
            val-clean-additional: yes

            ###########################################################################
            # PERFORMANCE SETTINGS
            ###########################################################################
            # https://nlnetlabs.nl/documentation/unbound/howto-optimise/
            # https://nlnetlabs.nl/news/2019/Feb/05/unbound-1.9.0-released/

            # Number of slabs in the infrastructure cache. Slabs reduce lock contention
            # by threads. Must be set to a power of 2.
            infra-cache-slabs: 2

            # Number of incoming TCP buffers to allocate per thread. Default
            # is 10. If set to 0, or if do-tcp is "no", no  TCP  queries  from
            # clients  are  accepted. For larger installations increasing this
            # value is a good idea.
            incoming-num-tcp: 10

            # Number of slabs in the key cache. Slabs reduce lock contention by
            # threads. Must be set to a power of 2. Setting (close) to the number
            # of cpus is a reasonable guess.
            key-cache-slabs: 2

            # Number  of  bytes  size  of  the  message  cache.
            # Unbound recommendation is to Use roughly twice as much rrset cache memory
            # as you use msg cache memory.
            msg-cache-size: "64m"

            # Number of slabs in the message cache. Slabs reduce lock contention by
            # threads. Must be set to a power of 2. Setting (close) to the number of
            # cpus is a reasonable guess.
            msg-cache-slabs: 2

            # The number of queries that every thread will service simultaneously. If
            # more queries arrive that need servicing, and no queries can be jostled
            # out (see jostle-timeout), then the queries are dropped.
            # This is best set at half the number of the outgoing-range.
            # This Unbound instance was compiled with libevent so it can efficiently
            # use more than 1024 file descriptors.
            num-queries-per-thread: 4096

            # The number of threads to create to serve clients.
            # This is set dynamically at run time to effectively use available CPUs
            # resources
            num-threads: 1

            # Number of ports to open. This number of file descriptors can be opened
            # per thread.
            # This Unbound instance was compiled with libevent so it can efficiently
            # use more than 1024 file descriptors.
            outgoing-range: 8192

            # Number of bytes size of the RRset cache.
            # Use roughly twice as much rrset cache memory as msg cache memory
            rrset-cache-size: "128m"

            # Number of slabs in the RRset cache. Slabs reduce lock contention by
            # threads. Must be set to a power of 2.
            rrset-cache-slabs: 2

            # Do no insert authority/additional sections into response messages when
            # those sections are not required. This reduces response size
            # significantly, and may avoid TCP fallback for some responses. This may
            # cause a slight speedup.
            minimal-responses: yes

            # # Fetch the DNSKEYs earlier in the validation process, when a DS record
            # is encountered. This lowers the latency of requests at the expense of
            # little more CPU usage.
            prefetch: yes

            # Fetch the DNSKEYs earlier in the validation process, when a DS record is
            # encountered. This lowers the latency of requests at the expense of little
            # more CPU usage.
            prefetch-key: yes

            # Have unbound attempt to serve old responses from cache with a TTL of 0 in
            # the response without waiting for the actual resolution to finish. The
            # actual resolution answer ends up in the cache later on.
            serve-expired: yes

            # Open dedicated listening sockets for incoming queries for each thread and
            # try to set the SO_REUSEPORT socket option on each socket. May distribute
            # incoming queries to threads more evenly.
            so-reuseport: yes

            ###########################################################################
            # LOCAL ZONE
            ###########################################################################

            # Include file for local-data and local-data-ptr
            # include: /opt/unbound/etc/unbound/a-records.conf
            # include: /opt/unbound/etc/unbound/srv-records.conf

            ###########################################################################
            # FORWARD ZONE
            ###########################################################################

            # include: /etc/unbound/forward-records.conf

        remote-control:
            control-enable: yes
            control-use-cert: no
            control-interface: /var/run/unbound/unbound.ctl

  - name: unbound-forward-records-conf
    files:
      forward-records.conf: |
        forward-zone:
            # Forward all queries (except those in cache and local zone) to
            # upstream recursive servers
            name: "."
            # Queries to this forward zone use TLS
            forward-tls-upstream: yes

            # https://dnsprivacy.org/wiki/display/DP/DNS+Privacy+Test+Servers

            # Cloudflare
            forward-addr: 1.1.1.1@853#cloudflare-dns.com
            forward-addr: 1.0.0.1@853#cloudflare-dns.com
            #forward-addr: 2606:4700:4700::1111@853#cloudflare-dns.com
            #forward-addr: 2606:4700:4700::1001@853#cloudflare-dns.com

            # CleanBrowsing
            # forward-addr: 185.228.168.9@853#security-filter-dns.cleanbrowsing.org
            # forward-addr: 185.228.169.9@853#security-filter-dns.cleanbrowsing.org
            # forward-addr: 2a0d:2a00:1::2@853#security-filter-dns.cleanbrowsing.org
            # forward-addr: 2a0d:2a00:2::2@853#security-filter-dns.cleanbrowsing.org

            # Quad9
            # forward-addr: 9.9.9.9@853#dns.quad9.net
            # forward-addr: 149.112.112.112@853#dns.quad9.net
            # forward-addr: 2620:fe::fe@853#dns.quad9.net
            # forward-addr: 2620:fe::9@853#dns.quad9.net

            # getdnsapi.net
            # forward-addr: 185.49.141.37@853#getdnsapi.net
            # forward-addr: 2a04:b900:0:100::37@853#getdnsapi.net

            # Surfnet
            # forward-addr: 145.100.185.15@853#dnsovertls.sinodun.com
            # forward-addr: 145.100.185.16@853#dnsovertls1.sinodun.com
            # forward-addr: 2001:610:1:40ba:145:100:185:15@853#dnsovertls.sinodun.com
            # forward-addr: 2001:610:1:40ba:145:100:185:16@853#dnsovertls1.sinodun.com


# No secrets — unbound authenticates to nothing.
externalSecrets: []

# -----------------------------------------------------------------------------
# Resources for the MAIN container (the sidecar has its own, below).
# -----------------------------------------------------------------------------
resources:
  requests:
    memory: "32Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "200m"

# -----------------------------------------------------------------------------
# Probes — a TCP connect to 53 is the meaningful liveness signal for a resolver.
# -----------------------------------------------------------------------------
readinessProbe:
  tcpSocket:
    port: 53
  initialDelaySeconds: 5
  periodSeconds: 20

livenessProbe:
  tcpSocket:
    port: 53
  initialDelaySeconds: 15
  periodSeconds: 20

# -----------------------------------------------------------------------------
# Volumes / mounts for the MAIN container.
#   unbound-socket — emptyDir shared with the exporter sidecar; unbound's remote
#                    control socket (unbound.ctl) lives here. This is the whole
#                    reason the two containers share a pod.
# -----------------------------------------------------------------------------
volumeMounts:
  - name: unbound-socket
    mountPath: /var/run/unbound
  - name: unbound-main-conf-volume
    mountPath: /etc/unbound/unbound.conf
    subPath: unbound.conf
  - name: unbound-forward-conf-volume
    mountPath: /etc/unbound/forward-records.conf
    subPath: forward-records.conf

volumes:
  - name: unbound-socket
    emptyDir: {}
  - name: unbound-main-conf-volume
    configMap:
      name: unbound-main-conf
  - name: unbound-forward-conf-volume
    configMap:
      name: unbound-forward-records-conf

# Init containers (none for this app).
initContainers: []

# -----------------------------------------------------------------------------
# Sidecar containers (common >= 0.3.0), appended after the main container and
# passed through VERBATIM. unbound-exporter connects to unbound's control socket
# on the shared emptyDir and serves Prometheus metrics on :9167 — that is what
# the ServiceMonitor at the bottom of this file scrapes.
#
# Because the list is verbatim, the image is a combined "repo:tag" string rather
# than the structured image.repository/image.tag above. The renovate comment
# directly above the `image:` line is what keeps it updated (see the second
# customManager in renovate.json) — do not separate the two lines.
# -----------------------------------------------------------------------------
extraContainers:
  - name: "exporter"
    # renovate: datasource=docker depName=cyb3rjak3/unbound-exporter
    image: cyb3rjak3/unbound-exporter:0.6.0
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        memory: "32Mi"
        cpu: "10m"
      limits:
        memory: "128Mi"
        cpu: "100m"
    securityContext:
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: false
      privileged: false
      capabilities:
        drop: [ALL]
    ports:
      - name: metrics
        containerPort: 9167
        protocol: TCP
    volumeMounts:
      - name: unbound-socket
        mountPath: /var/run/unbound
    args:
      - -unbound.host=unix:///var/run/unbound/unbound.ctl

# -----------------------------------------------------------------------------
# Service — one ClusterIP exposing DNS on both protocols plus the sidecar's
# metrics port.
# -----------------------------------------------------------------------------
services:
  - name: unbound
    enabled: true
    type: ClusterIP
    ports:
      - name: dns-udp
        protocol: UDP
        port: 53
        targetPort: 53
      - name: dns-tcp
        protocol: TCP
        port: 53
        targetPort: 53
      - name: metrics
        protocol: TCP
        port: 9167
        targetPort: metrics

# -----------------------------------------------------------------------------
# No IngressRoute: unbound is an in-cluster resolver reached by Service/MetalLB,
# never through Traefik. Omitting `routes` skips the object entirely.
# -----------------------------------------------------------------------------
ingressRoute: {}

# -----------------------------------------------------------------------------
# ServiceMonitor — scrapes the exporter sidecar via the Service's `metrics` port.
#
# MIGRATION NOTE: the object was previously named `unbound-exporter`; it is
# normalized to `unbound` (the chart names it after the app), matching the same
# change made for nut-exporter. The `release: prometheus-operator` label is
# preserved but vestigial — serviceMonitorSelectorNilUsesHelmValues: false means
# Prometheus discovers all ServiceMonitors regardless of labels.
# -----------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  labels:
    release: prometheus-operator
  endpoints:
    - path: /metrics
      interval: 30s
      targetPort: metrics
      honorLabels: true

# Static PVCs / PVs — none (in-memory cache only).
persistentVolumeClaims: []
persistentVolumes: []

# Extra labels merged into the standard label block.
extraLabels: {}
