apiVersion: v2
name: influxdb
description: InfluxDB 2.x OSS — long-term store for Home Assistant sensor data (fridge/freezer HACCP), StatefulSet-backed on Longhorn.
icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/influxdb.svg
type: application
version: 0.1.0
# NOTE: no appVersion here on purpose. The deployed app version is the container
# image tag in values.yaml (image.tag), which is the single source of truth and is
# kept current by Renovate. Duplicating it as appVersion would only risk drift.
# Floor is >= 0.4.0 (uses ingressRoute pathPrefix + middlewares: [] from 0.4.0).
dependencies:
  - name: common
    version: ">= 0.4.0"
    repository: "file://../common"
