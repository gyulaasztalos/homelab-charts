apiVersion: v2
name: common
description: >-
  HomeLab library chart. Named templates for the standard resource set
  (deployment/statefulset/daemonset, service, Traefik IngressRoute, Prometheus
  ServiceMonitor, PVC, ExternalSecret, ConfigMap) encoding homelab conventions.
icon: https://helm.sh/img/helm.svg
type: library
# 0.3.0 — podSpec gains `extraContainers` (sidecars appended after the main
#         container, passed through verbatim). Added for unbound's exporter.
# 0.2.0 — serviceAccount gains an optional `secrets:` back-reference and an
#         optional long-lived `tokenSecret` (kubernetes.io/service-account-token).
version: 0.3.0
maintainers:
  - name: gyulaasztalos
