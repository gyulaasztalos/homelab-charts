apiVersion: v2
name: nut-exporter
description: Network UPS Tools (NUT) Prometheus exporter (druggeri/nut_exporter) — scrapes UPS telemetry from a NUT server.
icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/nut.svg
type: application
version: 0.1.0
# NOTE: no appVersion here on purpose. The deployed app version is the container
# image tag in values.yaml (image.tag), which is the single source of truth and is
# kept current by Renovate. Duplicating it as appVersion would only risk drift.
# The `common` library chart lives in the same repo. ArgoCD checks out the whole
# repo and resolves this file:// dependency at render time (monorepo pattern);
# the ArgoCD Application uses a multi-source `ref` to this repo.
dependencies:
  - name: common
    version: ">= 0.3.0"
    repository: "file://../common"
