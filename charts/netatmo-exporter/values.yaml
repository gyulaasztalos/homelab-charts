# =============================================================================
# netatmo-exporter — EXAMPLE values (generic / shareable)
# Rendered through the `common` library chart (see charts/common).
#
# This file is a self-documenting EXAMPLE: every value the library chart
# understands is listed with its effective default and a comment, using GENERIC
# placeholders (example.com, sample 1Password refs) so anyone can fork the chart.
# The real domain-specific deployment config lives in the GitOps repo
# (apps/netatmo-exporter/values.yaml) and overrides this file at deploy time via
# Helm `valueFiles`. The chart still renders validly on these defaults alone.
# =============================================================================

name: netatmo-exporter
namespace: netatmo-exporter

# -----------------------------------------------------------------------------
# Container image. image.tag is the single source of truth for the app version.
# -----------------------------------------------------------------------------
image:
  repository: ghcr.io/xperimental/netatmo-exporter
  # renovate: datasource=docker depName=ghcr.io/xperimental/netatmo-exporter
  tag: "2.1.2"
  pullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# Controller. Owns a writable RWO config volume (token cache) → StatefulSet, per
# the homelab rule. The cached token is regenerable (the init container re-seeds
# it from the ExternalSecret), so migration is delete-and-recreate.
# -----------------------------------------------------------------------------
controller:
  type: statefulset
  replicas: 1
  revisionHistoryLimit: 2
  updateStrategy:
    type: RollingUpdate

# Per-replica RWO volume (→ config-netatmo-exporter-0), mounted at /config.
volumeClaimTemplates:
  - metadata:
      name: config
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: longhorn
      resources:
        requests:
          storage: 10Mi

# -----------------------------------------------------------------------------
# ServiceAccount. This app never calls the Kubernetes API, so it runs under the
# namespace's `default` ServiceAccount and the chart creates nothing.
#
# Full knob set (common >= 0.2.0), for when an app DOES need its own identity:
#   create: true         render a ServiceAccount, named after the app
#   name: <app>          override that name
#   annotations: {}      e.g. cloud IAM role bindings
#   secrets: []          the SA's own `secrets:` back-reference
#   tokenSecret:
#     create: true       emit a LONG-LIVED kubernetes.io/service-account-token
#                        Secret — Kubernetes >= 1.24 no longer auto-creates one,
#                        so an app needing a durable API token must ask for it.
#                        Rendered EMPTY: the template has no data/stringData
#                        field at all, and kube-controller-manager populates the
#                        token in-cluster, so no secret material enters the repo.
#     name: <app>        defaults to the ServiceAccount name
# Also set the top-level `serviceAccountName` so the pod actually uses it.
# See charts/homepage for a worked example (its `kubernetes` widget needs one).
# -----------------------------------------------------------------------------
serviceAccount:
  create: false
  secrets: []
  tokenSecret:
    create: false

# -----------------------------------------------------------------------------
# Security (homelab standard: fully non-root, RuntimeDefault seccomp).
# -----------------------------------------------------------------------------
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
  fsGroup: 1000
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  privileged: false

podAntiAffinity: true

# -----------------------------------------------------------------------------
# Ports.
# -----------------------------------------------------------------------------
ports:
  - name: http
    containerPort: 9210

# -----------------------------------------------------------------------------
# Configuration. Non-secret env from a generated ConfigMap; secret client id/secret
# injected as individual env vars from the ExternalSecret-created Secret.
# -----------------------------------------------------------------------------
envFromConfigMap: netatmo-exporter-config
envFromSecrets: []
env:
  - name: NETATMO_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: netatmo-exporter-secret
        key: NETATMO_CLIENT_ID
  - name: NETATMO_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: netatmo-exporter-secret
        key: NETATMO_CLIENT_SECRET

configMaps:
  - name: netatmo-exporter-config
    data:
      NETATMO_EXPORTER_TOKEN_FILE: /config/netatmo-token.json
      # External URL used in the OAuth redirect. Override with your real host.
      NETATMO_EXPORTER_EXTERNAL_URL: https://netatmo-exporter.example.com

# -----------------------------------------------------------------------------
# Secrets — ExternalSecret (onepassword-connect). Provides the OAuth client
# credentials as env keys and seeds the initial token file (netatmo-token.json).
# The {{ .* }} placeholders are the ExternalSecret's own runtime templating,
# written raw (values.yaml is not Helm-processed).
# -----------------------------------------------------------------------------
externalSecrets:
  - name: netatmo-exporter-secret
    refreshInterval: 1h
    target:
      template:
        engineVersion: v2
        type: Opaque
        data:
          NETATMO_CLIENT_ID: "{{ .client_id }}"
          NETATMO_CLIENT_SECRET: "{{ .client_secret }}"
          netatmo-token.json: |
            {
              "access_token":"{{ .access_token }}",
              "refresh_token":"{{ .refresh_token }}",
              "expiry":"2025-07-30T10:50:59.589899665Z"}
            }
    data:
      - secretKey: client_id
        remoteRef:
          key: netatmo-exporter
          property: client_id
      - secretKey: client_secret
        remoteRef:
          key: netatmo-exporter
          property: client_secret
      - secretKey: access_token
        remoteRef:
          key: netatmo-exporter
          property: access_token
      - secretKey: refresh_token
        remoteRef:
          key: netatmo-exporter
          property: refresh_token

# -----------------------------------------------------------------------------
# Init container — seeds the token file from the secret into the config volume on
# first start (idempotent; skips if already present).
# -----------------------------------------------------------------------------
initContainers:
  - name: add-netatmo-token
    image: alpine:3.24
    imagePullPolicy: IfNotPresent
    securityContext:
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      privileged: false
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    command:
      - sh
      - -c
      - |
        [ ! -s /config/netatmo-token.json ] && cp /secrets/netatmo-token.json /config/netatmo-token.json
        chmod 600 /config/netatmo-token.json
    volumeMounts:
      - name: netatmo-exporter-secret
        mountPath: /secrets/netatmo-token.json
        subPath: netatmo-token.json
      - name: config
        mountPath: /config

# -----------------------------------------------------------------------------
# Resources.
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

# -----------------------------------------------------------------------------
# Probes — httpGet /metrics on :9210.
# -----------------------------------------------------------------------------
readinessProbe:
  httpGet:
    path: /metrics
    port: 9210
  initialDelaySeconds: 10
  periodSeconds: 20
  failureThreshold: 5
  successThreshold: 1
  timeoutSeconds: 10

livenessProbe:
  httpGet:
    path: /metrics
    port: 9210
  initialDelaySeconds: 30
  periodSeconds: 20
  failureThreshold: 5
  successThreshold: 1
  timeoutSeconds: 10

# -----------------------------------------------------------------------------
# Volumes / mounts. `config` comes from the volumeClaimTemplate; the secret is
# mounted for the init container to read.
# -----------------------------------------------------------------------------
volumeMounts:
  - name: config
    mountPath: /config

volumes:
  - name: netatmo-exporter-secret
    secret:
      secretName: netatmo-exporter-secret

# -----------------------------------------------------------------------------
# Sidecar containers (common >= 0.3.0) — a list appended AFTER the main container
# and passed through verbatim, the same contract as initContainers above.
# None here: this app is a single process.
#
# Used when a workload genuinely needs a co-process in the same pod — see
# charts/unbound, whose exporter reads the resolver's control socket over a
# shared emptyDir. Because the list is verbatim, a sidecar's image is a combined
# "repo:tag" string rather than the structured image.repository/image.tag; put a
# `# renovate:` comment on the line DIRECTLY above `image:` so the second
# customManager in renovate.json keeps it updated.
# -----------------------------------------------------------------------------
extraContainers: []

# -----------------------------------------------------------------------------
# Service(s) — list form. ClusterIP, targetPort by name.
# -----------------------------------------------------------------------------
services:
  - name: netatmo-exporter
    enabled: true
    type: ClusterIP
    ports:
      - name: http
        protocol: TCP
        port: 9210
        targetPort: http

# -----------------------------------------------------------------------------
# Traefik IngressRoute — one object with a `routes` list. Browser path guarded
# by authentik + default-headers.
# -----------------------------------------------------------------------------
ingressRoute:
  enabled: true
  ingressClassName: traefik-external
  entryPoint: websecure
  tlsSecretName: example-com-tls
  routes:
    - host: netatmo-exporter.example.com
      serviceName: netatmo-exporter
      port: 9210
      priority: 10
      middlewares:
        - name: authentik
          namespace: traefik
        - name: default-headers
          namespace: traefik

# -----------------------------------------------------------------------------
# ServiceMonitor — this exporter IS scraped. `release: prometheus-operator` label
# preserved from the original (harmless; Prometheus discovers all ServiceMonitors
# regardless of label per the cluster config).
# -----------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  labels:
    release: prometheus-operator
  endpoints:
    - path: /metrics
      interval: 30s
      targetPort: http
      honorLabels: true

# Static PVCs / PVs — none.
persistentVolumeClaims: []
persistentVolumes: []

extraLabels: {}
