apiVersion: v2
name: cake-order
description: cake-order — public cake-ordering web app (anitatortai.hu). The chart renders the CORE workload only; the CNPG Database, migrate Job, purge CronJob, NetworkPolicies and cloudflared tunnel live in the app's post-install source.
type: application
version: 0.1.0
# NOTE: no appVersion here on purpose. The deployed app version is the container
# image tag in values.yaml (image.tag), which is the single source of truth and is
# kept current by Renovate. Duplicating it as appVersion would only risk drift.
# Floor is >= 0.4.0 to match the rest of the repo.
dependencies:
  - name: common
    version: ">= 0.4.0"
    repository: "file://../common"
