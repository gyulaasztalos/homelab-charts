# =============================================================================
# cake-order — EXAMPLE values (generic / shareable)
# Rendered through the `common` library chart (see charts/common).
#
# This file is a self-documenting EXAMPLE with example.com placeholders. The real
# deployment config lives in the GitOps repo (apps/cake-order/values.yaml) and
# overrides this at deploy time. The chart renders only the CORE workload; the
# CNPG Database, migrate Job, purge CronJob, NetworkPolicies and cloudflared
# tunnel live in apps/cake-order/post-install/ (see "Scope boundary").
# =============================================================================
name: cake-order
namespace: cake-order

# -----------------------------------------------------------------------------
# Container image. image.tag is the single source of truth for the app version.
# The migrate Job and purge CronJob (post-install) pin the SAME tag in lockstep.
# -----------------------------------------------------------------------------
image:
  repository: asztalosgyula/cake-order
  # renovate: datasource=docker depName=asztalosgyula/cake-order
  tag: 1.1.3
  pullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# Controller. Deployment. The app serves gallery photos from a pod-local emptyDir
# populated at startup from the NFS share by the prepare-gallery initContainer, so
# a hung NAS never affects the running app. maxUnavailable 0 keeps the public site
# up during rollouts.
#
# kube-linter waiver: the prepare-gallery initContainer runs ImageMagick, which
# needs a writable /tmp — so it (only it) sets readOnlyRootFilesystem: false. The
# main container keeps a read-only rootfs.
# -----------------------------------------------------------------------------
controller:
  type: deployment
  replicas: 1
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  annotations:
    ignore-check.kube-linter.io/no-read-only-root-fs: "The prepare-gallery initContainer runs ImageMagick, which needs a writable /tmp; the main container keeps a read-only root filesystem."

# -----------------------------------------------------------------------------
# ServiceAccount. The app never calls the Kubernetes API — runs under `default`.
# -----------------------------------------------------------------------------
serviceAccount:
  create: false
  secrets: []
  tokenSecret:
    create: false

# -----------------------------------------------------------------------------
# Pod security — fully non-root, RuntimeDefault seccomp.
# -----------------------------------------------------------------------------
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
  fsGroup: 1000
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

# Container-level security context (the MAIN container).
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  privileged: false

podAntiAffinity: true

# -----------------------------------------------------------------------------
# Ports.
# -----------------------------------------------------------------------------
ports:
  - containerPort: 8000
    name: http

# -----------------------------------------------------------------------------
# Configuration — all via env. DB creds + SMTP + intake token come from the two
# ExternalSecrets below; the rest are literal app config.
# -----------------------------------------------------------------------------
envFromConfigMap: ""
envFromSecrets: []
env:
  - name: APP_ENV
    value: prod
  - name: BASE_URL
    value: https://cake-order.example.com
  - name: PUBLIC_HOSTS
    value: cake-order.example.com
  - name: ENABLED_LOCALES
    value: hu,en
  - name: DB_HOST
    value: postgres-rw.databases.svc.cluster.local
  - name: DB_NAME
    value: cake-order
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: cake-order-postgres-secret
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: cake-order-postgres-secret
        key: password
  - name: SMTP_HOST
    value: smtp.mail.me.com
  - name: SMTP_PORT
    value: "587"
  - name: SMTP_SECURITY
    value: starttls
  - name: SMTP_USER
    valueFrom:
      secretKeyRef:
        name: cake-order-app-secret
        key: smtp_user
  - name: SMTP_PASSWORD
    valueFrom:
      secretKeyRef:
        name: cake-order-app-secret
        key: smtp_password
  - name: MAIL_FROM
    value: info@example.com
  - name: ORDER_INBOX
    value: info@example.com
  - name: RATE_HASH_SALT
    valueFrom:
      secretKeyRef:
        name: cake-order-app-secret
        key: rate_hash_salt
  - name: BACKEND_ENABLED
    value: "true"
  - name: BACKEND_URL
    value: http://cake-pricing.cake-pricing.svc.cluster.local
  - name: BACKEND_TOKEN
    valueFrom:
      secretKeyRef:
        name: cake-order-app-secret
        key: intake_token
  - name: PRICING_BASE_URL
    value: https://cake-pricing.example.com
  - name: ANALYTICS_SRC
    value: https://umami.example.com/script.js
  - name: ANALYTICS_WEBSITE_ID
    value: ""

configMaps: []

# -----------------------------------------------------------------------------
# Secrets — the app's DB role creds and app secrets (SMTP, salt, intake token).
# The tunnel secret lives with cloudflared in post-install. NO secret material here.
# -----------------------------------------------------------------------------
externalSecrets:
  - name: cake-order-postgres-secret
    refreshInterval: 1h
    target:
      template:
        engineVersion: v2
        type: Opaque
        data:
          username: "{{ .username }}"
          password: "{{ .password }}"
    data:
      - secretKey: username
        remoteRef:
          key: cake-order-postgres-password
          property: username
      - secretKey: password
        remoteRef:
          key: cake-order-postgres-password
          property: password
  - name: cake-order-app-secret
    refreshInterval: 1h
    target:
      template:
        engineVersion: v2
        type: Opaque
        data:
          smtp_user: "{{ .smtp_user }}"
          smtp_password: "{{ .smtp_password }}"
          rate_hash_salt: "{{ .rate_hash_salt }}"
          intake_token: "{{ .intake_token }}"
    data:
      - secretKey: smtp_user
        remoteRef:
          key: cake-order-app
          property: username
      - secretKey: smtp_password
        remoteRef:
          key: cake-order-app
          property: password
      - secretKey: rate_hash_salt
        remoteRef:
          key: cake-order-app
          property: rate_hash_salt
      - secretKey: intake_token
        remoteRef:
          key: cake-order-app
          property: intake_token

# -----------------------------------------------------------------------------
# Resources (MAIN container).
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 25m
    memory: 96Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -----------------------------------------------------------------------------
# Probes.
# -----------------------------------------------------------------------------
readinessProbe:
  httpGet:
    path: /readyz
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 15
  failureThreshold: 5
  successThreshold: 1
  timeoutSeconds: 5

livenessProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 30
  failureThreshold: 6
  successThreshold: 1
  timeoutSeconds: 5

# -----------------------------------------------------------------------------
# initContainer — copies the NAS gallery photos into a pod-local emptyDir, renames
# them to their EXIF capture date for chronological ordering, and generates
# thumbnails. Reproduced verbatim from the original manifest.
# -----------------------------------------------------------------------------
initContainers:
  - name: prepare-gallery
    # renovate: datasource=docker depName=minidocks/imagemagick
    image: minidocks/imagemagick:7
    command:
      - sh
      - -c
      - |
        set -u
        for KIND in cakes desserts hero
        do
          mkdir -p "/local/${KIND}"
          cp -a "/nfs/${KIND}/." "/local/${KIND}/" 2>/dev/null || true
        done
        # Rename to the capture date. Fallback chain: EXIF DateTimeOriginal
        # -> EXIF DateTime -> file mtime -> keep the original name (never
        # drop a photo). Same-minute shots get a -2/-3 suffix so a
        # collision can never silently overwrite another photo.
        for KIND in cakes desserts hero
        do
          find "/local/${KIND}" -maxdepth 1 -type f \
            \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' \) \
            | while IFS= read -r FILE
              do
                # get the extension in lowercase, so .JPG and .jpg are treated the same
                EXT=$(printf '%s' "${FILE##*.}" | tr 'A-Z' 'a-z')
                # get the capture date from EXIF
                CAPTURE_DATE=$(identify -format '%[EXIF:DateTimeOriginal]' "${FILE}" 2>/dev/null)
                [ -n "$CAPTURE_DATE" ] || CAPTURE_DATE=$(identify -format '%[EXIF:DateTime]' "${FILE}" 2>/dev/null)
                # create a 12-digit timestamp from the capture date
                STAMP=$(printf '%s' "$CAPTURE_DATE" | tr -cd '0-9' | cut -c1-12)
                # If timestamp is not 12 digits, fallback to file mtime.
                [ ${#STAMP} -eq 12 ] || STAMP=$(date -r "${FILE}" +%Y%m%d%H%M 2>/dev/null)
                # If timestamp is still not 12 digits, skip renaming this file.
                [ ${#STAMP} -eq 12 ] || continue
                TARGET="/local/${KIND}/${STAMP}.${EXT}"
                # If a file with the same timestamp already exists, append a suffix to avoid overwriting.
                n=2
                while [ -e "${TARGET}" ] && [ "${TARGET}" != "${FILE}" ]
                do
                  TARGET="/local/${KIND}/${STAMP}-$n.${EXT}"
                  n=$((n + 1))
                done
                # when the first available suffix is found, rename the file to the target name (if it's not already the same)
                if [ "${TARGET}" != "${FILE}" ]
                then
                  mv "${FILE}" "${TARGET}"
                fi
              done
        done
        for KIND in cakes desserts
        do
          mkdir -p "/local/${KIND}/thumbs"
          find "/local/${KIND}" -maxdepth 1 -type f \
            \( -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.png' -o -iname '*.webp' \) \
            | while IFS= read -r FILE
              do
                convert "${FILE}" -auto-orient -thumbnail '600x600^' -gravity center \
                  -extent 600x600 -quality 82 "/local/${KIND}/thumbs/$(basename "${FILE}")" \
                  2>/dev/null || true
              done
        done
        true
    securityContext:
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 512Mi
    volumeMounts:
      - name: gallery-nfs
        mountPath: /nfs
        readOnly: true
      - name: gallery-local
        mountPath: /local

# -----------------------------------------------------------------------------
# Volumes / mounts. The NFS gallery source is mounted read-only in the
# initContainer; the main container serves from the pod-local emptyDir copy,
# overlaying the three gallery subdirs.
# -----------------------------------------------------------------------------
volumeMounts:
  - name: gallery-local
    mountPath: /app/app/static/img/gallery/cakes
    subPath: cakes
    readOnly: true
  - name: gallery-local
    mountPath: /app/app/static/img/gallery/desserts
    subPath: desserts
    readOnly: true
  - name: gallery-local
    mountPath: /app/app/static/img/gallery/hero
    subPath: hero
    readOnly: true

volumes:
  - name: gallery-nfs
    persistentVolumeClaim:
      claimName: cake-order-gallery
  - name: gallery-local
    emptyDir: {}

extraContainers: []

# -----------------------------------------------------------------------------
# NFS gallery PV (ReadOnlyMany, Retain) + PVC. The chef manages photos by dropping
# them on the NAS share; new photos appear after a pod restart.
# -----------------------------------------------------------------------------
persistentVolumes:
  - name: cake-order-gallery-pv
    spec:
      capacity:
        storage: 1Gi
      accessModes:
        - ReadOnlyMany
      persistentVolumeReclaimPolicy: Retain
      storageClassName: cake-order-gallery
      nfs:
        server: nas.example.com
        path: /exports/cake-order

persistentVolumeClaims:
  - name: cake-order-gallery
    accessModes:
      - ReadOnlyMany
    storageClassName: cake-order-gallery
    size: 1Gi

# -----------------------------------------------------------------------------
# Service — port 80 → container 8000.
# -----------------------------------------------------------------------------
services:
  - name: cake-order
    enabled: true
    type: ClusterIP
    ports:
      - name: http
        protocol: TCP
        port: 80
        targetPort: 8000

# -----------------------------------------------------------------------------
# IngressRoute — the internal LAN route. PUBLIC app: deliberately NO authentik
# (abuse control is in the app), only the hardened default-headers middleware.
# Public traffic arrives via the cloudflared tunnel (post-install), not here.
# -----------------------------------------------------------------------------
ingressRoute:
  enabled: true
  ingressClassName: traefik-external
  entryPoint: websecure
  tlsSecretName: example-com-tls
  routes:
    - host: cake-order.example.com
      port: 80
      priority: 10
      middlewares:
        - name: default-headers
          namespace: traefik

# -----------------------------------------------------------------------------
# ServiceMonitor — scrapes /metrics on the http port.
# -----------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  labels:
    release: prometheus-operator
  endpoints:
    - port: http
      interval: 30s
      path: /metrics
      scheme: http
      honorLabels: true

extraLabels: {}
