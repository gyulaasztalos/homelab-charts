apiVersion: v2
name: transmission
description: Transmission BitTorrent client (LinuxServer.io) with the Flood web UI — StatefulSet-backed for its RWO config, MetalLB LoadBalancer for peer traffic, downloads on an NFS RWX share.
type: application
version: 0.1.0
# NOTE: no appVersion here on purpose. The deployed app version is the container
# image tag in values.yaml (image.tag), which is the single source of truth and is
# kept current by Renovate. Duplicating it as appVersion would only risk drift.
# Requires common >= 0.5.0 for the LoadBalancer Service fields (loadBalancerIP,
# externalTrafficPolicy).
dependencies:
  - name: common
    version: ">= 0.5.0"
    repository: "file://../common"
