apiVersion: v2
name: nebula-sync
description: nebula-sync (lovelaze/nebula-sync) — keeps a primary Pi-hole v6 and its replicas in sync on a cron schedule.
icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/pi-hole.svg
type: application
version: 0.1.0
# NOTE: no appVersion here on purpose. The deployed app version is the container
# image tag in values.yaml (image.tag), which is the single source of truth and is
# kept current by Renovate. Duplicating it as appVersion would only risk drift.
# Floor is >= 0.4.0 to match the rest of the repo (this chart uses no template
# surface newer than 0.1.0, but the values.yaml declares the full 0.4.0 knob set).
dependencies:
  - name: common
    version: ">= 0.4.0"
    repository: "file://../common"
