# =============================================================================
# ddns-updater — EXAMPLE values (generic / shareable)
# Rendered through the `common` library chart (see charts/common).
#
# This file is a self-documenting EXAMPLE: every value the library chart
# understands is listed with its effective default and a comment. The values
# here are GENERIC placeholders (example.com, sample secret refs) so anyone can
# fork this chart. The real, domain-specific deployment config lives in the
# GitOps repo (apps/ddns-updater/values.yaml) and overrides this file at deploy
# time via Helm `valueFiles`. The chart still renders validly on these defaults
# alone (CI renders it), it just points at example.com.
# =============================================================================

# App identity. `name` drives all resource names, labels and the namespace
# (namespace defaults to name).
name: ddns-updater
namespace: ddns-updater

# -----------------------------------------------------------------------------
# Container image. `image.tag` is the SINGLE source of truth for the app version
# (there is deliberately no Chart.yaml appVersion). Renovate bumps the tag below.
# -----------------------------------------------------------------------------
image:
  repository: qmcgaw/ddns-updater
  # renovate: datasource=docker depName=qmcgaw/ddns-updater
  tag: v2.10.0
  pullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# Controller. type = deployment | statefulset | daemonset.
# ddns-updater owns a writable RWO PVC (its data dir) and cannot run >1 replica,
# so per the homelab rule it is a StatefulSet using a volumeClaimTemplate.
# -----------------------------------------------------------------------------
controller:
  type: statefulset
  replicas: 1
  revisionHistoryLimit: 2
  # StatefulSet rolling update (one pod at a time; no RWO multi-attach).
  updateStrategy:
    type: RollingUpdate

# Per-replica RWO volume. Replaces the old static PVC `ddns-updater-data`.
# The generated PVC will be `data-ddns-updater-0`. Data is regenerable state.
volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: longhorn
      resources:
        requests:
          storage: 1Mi

# -----------------------------------------------------------------------------
# ServiceAccount. This app never calls the Kubernetes API, so it runs under the
# namespace's `default` ServiceAccount and the chart creates nothing.
#
# Full knob set (common >= 0.2.0), for when an app DOES need its own identity:
#   create: true         render a ServiceAccount, named after the app
#   name: <app>          override that name
#   annotations: {}      e.g. cloud IAM role bindings
#   secrets: []          the SA's own `secrets:` back-reference
#   tokenSecret:
#     create: true       emit a LONG-LIVED kubernetes.io/service-account-token
#                        Secret — Kubernetes >= 1.24 no longer auto-creates one,
#                        so an app needing a durable API token must ask for it.
#                        Rendered EMPTY: the template has no data/stringData
#                        field at all, and kube-controller-manager populates the
#                        token in-cluster, so no secret material enters the repo.
#     name: <app>        defaults to the ServiceAccount name
# Also set the top-level `serviceAccountName` so the pod actually uses it.
# See charts/homepage for a worked example (its `kubernetes` widget needs one).
# -----------------------------------------------------------------------------
serviceAccount:
  create: false
  secrets: []
  tokenSecret:
    create: false

# -----------------------------------------------------------------------------
# Pod security. Homelab standard: fully non-root, RuntimeDefault seccomp.
# -----------------------------------------------------------------------------
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
  fsGroup: 1000
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

# Container-level security context.
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  privileged: false

# Schedule at most one replica per node (default true in the library chart).
podAntiAffinity: true

# -----------------------------------------------------------------------------
# Ports exposed by the container.
# -----------------------------------------------------------------------------
ports:
  - name: webui
    containerPort: 8000
    protocol: TCP
  - name: health
    containerPort: 9999
    protocol: TCP

# -----------------------------------------------------------------------------
# Configuration. Non-secret env comes from a generated ConfigMap (envFrom);
# secrets are pulled via ExternalSecret and mounted as a file.
# -----------------------------------------------------------------------------
envFromConfigMap: ddns-updater-env
envFromSecrets: []
env: []

configMaps:
  - name: ddns-updater-env
    data:
      TZ: "Europe/Budapest"
      PERIOD: "5m"
      UPDATE_COOLDOWN_PERIOD: "5m"
      PUBLICIP_FETCHERS: "all"
      PUBLICIP_HTTP_PROVIDERS: "all"
      PUBLICIPV4_HTTP_PROVIDERS: "all"
      PUBLICIPV6_HTTP_PROVIDERS: "all"
      PUBLICIP_DNS_PROVIDERS: "all"
      PUBLICIP_DNS_TIMEOUT: "3s"
      HTTP_TIMEOUT: "10s"
      LISTENING_PORT: "8000"
      ROOT_URL: "/"
      BACKUP_PERIOD: "0" # 0 to disable
      BACKUP_DIRECTORY: "/updater/data"
      CONFIG_FILEPATH: "/updater/config/config.json"
      LOG_LEVEL: "info"
      LOG_CALLER: "hidden"
      HEALTH_SERVER_ADDRESS: "0.0.0.0:9999"
      # EXAMPLE notification target. Override with your own shoutrrr URL in the
      # GitOps values.yaml (e.g. an apprise/gotify/telegram endpoint).
      SHOUTRRR_ADDRESSES: "generic://apprise.example.svc.cluster.local:8000/notify/apprise?template=json&messagekey=body&disabletls=yes&tag=ddns&type=info&title=DDNS"

# -----------------------------------------------------------------------------
# Secrets — ExternalSecret referencing the onepassword-connect ClusterSecretStore.
# Renders the ddns-updater config.json (contains the DNS provider token/zone).
# NO secret material is stored here — only references. Replace the domains and
# the 1Password item/property names to match your own vault in the GitOps values.
# NOTE: the {{ .cloudflare_zone_id }} placeholders below are the ExternalSecret's
# OWN templating (engineVersion v2), resolved by External Secrets Operator at
# runtime. They are written RAW here on purpose: values.yaml is not processed by
# Helm, so these braces pass through untouched into the rendered manifest.
# -----------------------------------------------------------------------------
externalSecrets:
  - name: ddns-updater-secret
    refreshInterval: 1h
    target:
      template:
        engineVersion: v2
        type: Opaque
        data:
          config.json: |
            {
              "settings": [
                {
                  "provider": "cloudflare",
                  "zone_identifier": "{{ .cloudflare_zone_id }}",
                  "domain": "@.example.com",
                  "ttl": 600,
                  "token": "{{ .cloudflare_token }}",
                  "ip_version": "ipv4"
                },
                {
                  "provider": "cloudflare",
                  "zone_identifier": "{{ .cloudflare_zone_id }}",
                  "domain": "@.example.com",
                  "ttl": 600,
                  "token": "{{ .cloudflare_token }}",
                  "ip_version": "ipv6",
                  "ipv6_suffix": ""
                }
              ]
            }
    data:
      - secretKey: cloudflare_zone_id
        remoteRef:
          key: cloudflare-token-secret
          property: cloudflare-zone-id
      - secretKey: cloudflare_token
        remoteRef:
          key: cloudflare-token-secret
          property: cloudflare-token

# -----------------------------------------------------------------------------
# Resources.
# -----------------------------------------------------------------------------
resources:
  requests:
    memory: "32Mi"
    cpu: "50m"
  limits:
    memory: "64Mi"
    cpu: "100m"

# -----------------------------------------------------------------------------
# Probes. ddns-updater exposes a health server on :9999.
# -----------------------------------------------------------------------------
readinessProbe:
  httpGet:
    path: /
    port: 9999
    scheme: HTTP
  initialDelaySeconds: 60
  periodSeconds: 60
  timeoutSeconds: 10
  successThreshold: 1
  failureThreshold: 5

livenessProbe:
  httpGet:
    path: /
    port: 9999
    scheme: HTTP
  initialDelaySeconds: 60
  periodSeconds: 60
  timeoutSeconds: 10
  successThreshold: 1
  failureThreshold: 5

# -----------------------------------------------------------------------------
# Volumes / mounts. The `data` volume is provided by the volumeClaimTemplate
# above and mounted explicitly. The secret is mounted as config.json.
# -----------------------------------------------------------------------------
volumeMounts:
  - name: ddns-updater-secret
    mountPath: /updater/config/config.json
    subPath: config.json
  - name: data
    mountPath: /updater/data

volumes:
  - name: ddns-updater-secret
    secret:
      secretName: ddns-updater-secret

# -----------------------------------------------------------------------------
# Init containers (none for this app).
# -----------------------------------------------------------------------------
initContainers: []

# -----------------------------------------------------------------------------
# Sidecar containers (common >= 0.3.0) — a list appended AFTER the main container
# and passed through verbatim, the same contract as initContainers above.
# None here: this app is a single process.
#
# Used when a workload genuinely needs a co-process in the same pod — see
# charts/unbound, whose exporter reads the resolver's control socket over a
# shared emptyDir. Because the list is verbatim, a sidecar's image is a combined
# "repo:tag" string rather than the structured image.repository/image.tag; put a
# `# renovate:` comment on the line DIRECTLY above `image:` so the second
# customManager in renovate.json keeps it updated.
# -----------------------------------------------------------------------------
extraContainers: []

# -----------------------------------------------------------------------------
# Service(s) — a list, so a workload can expose more than one. ClusterIP,
# selects on the `app` label by default.
# -----------------------------------------------------------------------------
services:
  - name: ddns-updater
    enabled: true
    type: ClusterIP
    ports:
      - name: webui
        protocol: TCP
        port: 8000
        targetPort: 8000

# -----------------------------------------------------------------------------
# Traefik IngressRoute — one object with a `routes` list (a single IngressRoute
# can expose several routes). Browser path guarded by authentik + default-headers.
# Override `host` with your real hostname in the GitOps values.
# -----------------------------------------------------------------------------
ingressRoute:
  enabled: true
  ingressClassName: traefik-external
  entryPoint: websecure
  tlsSecretName: example-com-tls
  routes:
    - host: ddns-updater.example.com
      serviceName: ddns-updater
      port: 8000
      priority: 10
      middlewares:
        - name: authentik
          namespace: traefik
        - name: default-headers
          namespace: traefik

# -----------------------------------------------------------------------------
# ServiceMonitor.
# NOTE: disabled to match the CURRENT (pre-helmification) state. The absence of a
# ServiceMonitor here is considered a BUG in the existing setup — ddns-updater
# should probably be scraped. Tracked in PLAN.md backlog; revisit and enable
# before final cutover once the metrics endpoint is confirmed.
# -----------------------------------------------------------------------------
serviceMonitor:
  enabled: false
  labels: {}
  endpoints: []

# Static PVCs / PVs — none (RWO data handled by volumeClaimTemplates above).
persistentVolumeClaims: []
persistentVolumes: []

# Extra labels merged into the standard label block.
extraLabels: {}
